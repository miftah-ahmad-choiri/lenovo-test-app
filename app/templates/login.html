<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Lenovo Ticket Portal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
            font-size: 15px;
            background: #f7f8fa;
            color: #1f2328;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 40px 48px;
            max-width: 420px;
            width: 100%;
        }

        .logo {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #3b82d4;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: #57606a;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        /* ── Form fields ── */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #1f2328;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            color: #1f2328;
            background: #ffffff;
            transition: border-color 0.15s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #3b82d4;
        }

        /* ── Error alert ── */
        .alert-error {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            border-radius: 6px;
            color: #991b1b;
            font-size: 13px;
            padding: 10px 14px;
            margin-bottom: 20px;
        }

        /* ── Submit button ── */
        .btn-login {
            display: block;
            width: 100%;
            padding: 11px 20px;
            background: #3b82d4;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-login:hover {
            opacity: 0.85;
        }

        .footer {
            margin-top: 28px;
            font-size: 12px;
            color: #57606a;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="logo">Lenovo Service Portal</div>
        <h1>Sign in</h1>
        <p class="subtitle">Enter your user ID and password to access the ticket management portal.</p>

        {% if error %}
        <div class="alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.login') }}">

            <div class="form-group">
                <label for="user_id">User ID</label>
                <input
                    type="text"
                    id="user_id"
                    name="user_id"
                    placeholder="e.g. user001"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="btn-login">Sign in</button>

        </form>

    </div>

    <div class="footer">IBM TLS Lenovo</div>

</body>
</html>
