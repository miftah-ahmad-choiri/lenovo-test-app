<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Files — Lenovo Ticket Portal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
            font-size: 15px;
            background: #f7f8fa;
            color: #1f2328;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 40px 48px;
            max-width: 520px;
            width: 100%;
        }

        .nav-links {
            font-size: 13px;
            margin-bottom: 24px;
        }

        .nav-links a {
            color: #3b82d4;
            text-decoration: none;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .logo {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #3b82d4;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: #57606a;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .drop-zone {
            border: 2px dashed #e5e7eb;
            border-radius: 6px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            margin-bottom: 16px;
            position: relative;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: #3b82d4;
            background: #f0f6ff;
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .drop-zone-icon {
            font-size: 28px;
            margin-bottom: 10px;
            color: #57606a;
        }

        .drop-zone-label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .drop-zone-hint {
            font-size: 12px;
            color: #57606a;
        }

        .file-list {
            font-size: 13px;
            color: #57606a;
            margin-bottom: 16px;
            min-height: 20px;
        }

        .file-list span {
            display: inline-block;
            background: #f7f8fa;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            padding: 2px 8px;
            margin: 2px 4px 2px 0;
        }

        .btn-upload {
            display: block;
            width: 100%;
            padding: 11px 20px;
            background: #3b82d4;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-upload:hover {
            opacity: 0.85;
        }

        .btn-upload:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 20px;
            background: #f7f8fa;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 14px 16px;
            font-size: 13px;
            font-family: "Cascadia Code", "Consolas", monospace;
            white-space: pre-wrap;
            word-break: break-all;
            color: #1f2328;
            display: none;
        }

        .result-box.visible {
            display: block;
        }

        .footer {
            margin-top: 28px;
            font-size: 12px;
            color: #57606a;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="nav-links">
            <a href="/">&#8592; Back to Home</a>
        </div>

        <div class="logo">Lenovo Service Portal</div>
        <h1>Upload Files</h1>
        <p class="subtitle">Select Excel files and images to upload for ticket processing.</p>

        <div class="drop-zone" id="dropZone">
            <input type="file" id="files" multiple accept=".xlsx,.xls,.csv,.png,.jpg,.jpeg">
            <div class="drop-zone-icon">&#128196;</div>
            <div class="drop-zone-label">Click to browse or drag &amp; drop files here</div>
            <div class="drop-zone-hint">Supports .xlsx, .xls, .csv, .png, .jpg</div>
        </div>

        <div class="file-list" id="fileList"></div>

        <button class="btn-upload" id="uploadBtn" onclick="uploadFiles()" disabled>
            Upload
        </button>

        <pre class="result-box" id="result"></pre>

    </div>

    <div class="footer">IBM TLS Lenovo</div>

    <script>
        const filesInput  = document.getElementById("files");
        const fileList    = document.getElementById("fileList");
        const uploadBtn   = document.getElementById("uploadBtn");
        const dropZone    = document.getElementById("dropZone");
        const resultBox   = document.getElementById("result");

        filesInput.addEventListener("change", updateFileList);

        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.classList.add("dragover");
        });

        dropZone.addEventListener("dragleave", () => {
            dropZone.classList.remove("dragover");
        });

        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.classList.remove("dragover");
            filesInput.files = e.dataTransfer.files;
            updateFileList();
        });

        function updateFileList() {
            const files = filesInput.files;
            fileList.innerHTML = "";
            if (files.length === 0) {
                uploadBtn.disabled = true;
                return;
            }
            for (let f of files) {
                const tag = document.createElement("span");
                tag.textContent = f.name;
                fileList.appendChild(tag);
            }
            uploadBtn.disabled = false;
        }

        async function uploadFiles() {
            const files = filesInput.files;
            if (!files.length) return;

            uploadBtn.disabled = true;
            uploadBtn.textContent = "Uploading...";
            resultBox.classList.remove("visible");

            const formData = new FormData();
            for (let file of files) {
                formData.append("files", file);
            }

            const response = await fetch("/upload", {
                method: "POST",
                headers: { "ngrok-skip-browser-warning": "69420" },
                body: formData
            });

            const result = await response.json();

            resultBox.textContent = JSON.stringify(result, null, 2);
            resultBox.classList.add("visible");

            uploadBtn.textContent = "Upload";
            uploadBtn.disabled = false;
        }
    </script>

</body>
</html>
