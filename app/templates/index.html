<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Files — Lenovo Ticket Portal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
            font-size: 15px;
            background: #f7f8fa;
            color: #1f2328;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 40px 48px;
            max-width: 560px;
            width: 100%;
        }

        .nav-links {
            font-size: 13px;
            margin-bottom: 24px;
        }

        .nav-links a {
            color: #3b82d4;
            text-decoration: none;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .logo {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #3b82d4;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: #57606a;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        /* ── Drop zone ── */
        .drop-zone {
            border: 2px dashed #e5e7eb;
            border-radius: 6px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            margin-bottom: 16px;
            position: relative;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: #3b82d4;
            background: #f0f6ff;
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .drop-zone-icon {
            font-size: 28px;
            margin-bottom: 10px;
            color: #57606a;
        }

        .drop-zone-label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .drop-zone-hint {
            font-size: 12px;
            color: #57606a;
        }

        /* ── File status list ── */
        .file-status-list {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f7f8fa;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 9px 14px;
            font-size: 13px;
        }

        .file-row-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
        }

        .file-row-detail {
            font-size: 12px;
            color: #57606a;
            white-space: nowrap;
        }

        .badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .badge-pending  { background: #f3f4f6; color: #57606a; }
        .badge-uploading { background: #dbeafe; color: #1d4ed8; }
        .badge-success  { background: #d1fae5; color: #065f46; }
        .badge-error    { background: #fee2e2; color: #991b1b; }
        .badge-skipped  { background: #fef3c7; color: #92400e; }

        /* ── Upload button ── */
        .btn-upload {
            display: block;
            width: 100%;
            padding: 11px 20px;
            background: #3b82d4;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-upload:hover   { opacity: 0.85; }
        .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Summary banner ── */
        .summary-banner {
            display: none;
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid;
        }

        .summary-banner.success {
            display: block;
            background: #d1fae5;
            border-color: #6ee7b7;
            color: #065f46;
        }

        .summary-banner.partial {
            display: block;
            background: #fef3c7;
            border-color: #fcd34d;
            color: #92400e;
        }

        .summary-banner.error {
            display: block;
            background: #fee2e2;
            border-color: #fca5a5;
            color: #991b1b;
        }

        .summary-detail {
            margin-top: 6px;
            font-size: 12px;
            font-weight: 400;
            color: inherit;
            opacity: 0.85;
        }

        .footer {
            margin-top: 28px;
            font-size: 12px;
            color: #57606a;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="nav-links">
            <a href="/">&#8592; Back to Home</a>
        </div>

        <div class="logo">Lenovo Service Portal</div>
        <h1>Upload Files</h1>
        <p class="subtitle">Select Excel files and images — they will be uploaded to your Flask server and pushed to Box automatically.</p>

        <div class="drop-zone" id="dropZone">
            <input type="file" id="files" multiple accept=".xlsx,.xls,.csv,.png,.jpg,.jpeg">
            <div class="drop-zone-icon">&#128196;</div>
            <div class="drop-zone-label">Click to browse or drag &amp; drop files here</div>
            <div class="drop-zone-hint">Supports .xlsx, .xls, .csv, .png, .jpg</div>
        </div>

        <!-- Per-file status rows injected here by JS -->
        <div class="file-status-list" id="fileStatusList"></div>

        <button class="btn-upload" id="uploadBtn" onclick="uploadFiles()" disabled>
            Upload &amp; Send to Box
        </button>

        <!-- Summary banner shown after upload completes -->
        <div class="summary-banner" id="summaryBanner">
            <div id="summaryTitle"></div>
            <div class="summary-detail" id="summaryDetail"></div>
        </div>

    </div>

    <div class="footer">IBM TLS Lenovo</div>

    <script>
        const filesInput     = document.getElementById("files");
        const fileStatusList = document.getElementById("fileStatusList");
        const uploadBtn      = document.getElementById("uploadBtn");
        const dropZone       = document.getElementById("dropZone");
        const summaryBanner  = document.getElementById("summaryBanner");
        const summaryTitle   = document.getElementById("summaryTitle");
        const summaryDetail  = document.getElementById("summaryDetail");

        let selectedFiles = [];

        // ── File selection ──────────────────────────────────────────
        filesInput.addEventListener("change", () => {
            selectedFiles = Array.from(filesInput.files);
            renderFileRows();
        });

        dropZone.addEventListener("dragover",  (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
        dropZone.addEventListener("dragleave", ()  => { dropZone.classList.remove("dragover"); });
        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.classList.remove("dragover");
            filesInput.files  = e.dataTransfer.files;
            selectedFiles     = Array.from(filesInput.files);
            renderFileRows();
        });

        function renderFileRows() {
            fileStatusList.innerHTML = "";
            summaryBanner.className  = "summary-banner";

            if (selectedFiles.length === 0) {
                uploadBtn.disabled = true;
                return;
            }

            selectedFiles.forEach((f, i) => {
                const row = document.createElement("div");
                row.className  = "file-row";
                row.id         = `row-${i}`;
                row.innerHTML  = `
                    <span class="file-row-name" title="${f.name}">${f.name}</span>
                    <span class="file-row-detail">${formatBytes(f.size)}</span>
                    <span class="badge badge-pending" id="badge-${i}">Pending</span>
                `;
                fileStatusList.appendChild(row);
            });

            uploadBtn.disabled = false;
        }

        // ── Upload ──────────────────────────────────────────────────
        async function uploadFiles() {
            if (!selectedFiles.length) return;

            uploadBtn.disabled      = true;
            uploadBtn.textContent   = "Uploading...";
            summaryBanner.className = "summary-banner";

            // Mark every row as "Uploading"
            selectedFiles.forEach((_, i) => setBadge(i, "uploading", "Uploading..."));

            const formData = new FormData();
            selectedFiles.forEach(f => formData.append("files", f));

            let result;
            try {
                const response = await fetch("/upload", {
                    method: "POST",
                    headers: { "ngrok-skip-browser-warning": "69420" },
                    body: formData
                });
                result = await response.json();
            } catch (err) {
                // Network-level failure — mark everything as error
                selectedFiles.forEach((_, i) => setBadge(i, "error", "Network error"));
                showBanner("error", "Upload failed", err.message);
                uploadBtn.textContent = "Upload & Send to Box";
                uploadBtn.disabled    = false;
                return;
            }

            // Map server results back to the file rows by index
            const results = result.results || [];
            let nSuccess = 0, nError = 0, nSkipped = 0;

            results.forEach((r, i) => {
                if (r.status === "success") {
                    setBadge(i, "success", "Sent to Box");
                    setDetail(i, `Box ID: ${r.box_file_id}`);
                    nSuccess++;
                } else if (r.status === "error") {
                    setBadge(i, "error", "Failed");
                    setDetail(i, r.message);
                    nError++;
                } else {
                    setBadge(i, "skipped", "Skipped");
                    setDetail(i, r.message);
                    nSkipped++;
                }
            });

            // Summary banner
            if (nError === 0 && nSkipped === 0) {
                showBanner("success", `All ${nSuccess} file(s) uploaded to Box successfully.`, "Local copies have been removed from the server.");
            } else if (nSuccess > 0) {
                showBanner("partial", `${nSuccess} succeeded, ${nError} failed, ${nSkipped} skipped.`, "Check individual rows for error details.");
            } else {
                showBanner("error", "Upload completed with errors.", "No files were sent to Box.");
            }

            uploadBtn.textContent = "Upload & Send to Box";
            uploadBtn.disabled    = false;
        }

        // ── Helpers ─────────────────────────────────────────────────
        function setBadge(i, type, text) {
            const badge = document.getElementById(`badge-${i}`);
            if (!badge) return;
            badge.className   = `badge badge-${type}`;
            badge.textContent = text;
        }

        function setDetail(i, text) {
            const row = document.getElementById(`row-${i}`);
            if (!row) return;
            let detail = row.querySelector(".file-row-box-detail");
            if (!detail) {
                detail = document.createElement("span");
                detail.className = "file-row-box-detail file-row-detail";
                row.appendChild(detail);
            }
            detail.textContent = text;
        }

        function showBanner(type, title, detail) {
            summaryBanner.className = `summary-banner ${type}`;
            summaryTitle.textContent  = title;
            summaryDetail.textContent = detail;
        }

        function formatBytes(bytes) {
            if (bytes < 1024)        return bytes + " B";
            if (bytes < 1048576)     return (bytes / 1024).toFixed(1) + " KB";
            return (bytes / 1048576).toFixed(1) + " MB";
        }
    </script>

</body>
</html>
