<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lenovo Ticket Portal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
            font-size: 15px;
            background: #f7f8fa;
            color: #1f2328;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 40px 48px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #3b82d4;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #57606a;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: block;
            padding: 11px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: opacity 0.15s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-primary {
            background: #3b82d4;
            color: #ffffff;
        }

        .btn-secondary {
            background: #f7f8fa;
            color: #1f2328;
            border: 1px solid #e5e7eb;
        }

        .footer {
            margin-top: 28px;
            font-size: 12px;
            color: #57606a;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="logo">Lenovo Service Portal</div>
        <h1>Ticket Management</h1>
        <p>Upload Excel files and images for ticket processing, or view the dashboard to browse existing ticket records.</p>

        <div class="btn-group">
            <a class="btn btn-primary" href="/upload-page">Upload Files</a>
            <a class="btn btn-secondary" href="/dashboard">View Dashboard</a>
        </div>
    </div>

    <div class="footer">IBM TLS Lenovo</div>

</body>
</html>
